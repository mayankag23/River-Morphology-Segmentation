version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/river_morphology.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: standard
    filename: logs/river_morphology_errors.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers:
    - console

loggers:
  src:
    level: DEBUG
    handlers:
      - console
    propagate: false